<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlockWorld — Multiplayer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

    /* ---- LOBBY SCREEN ---- */
    #lobby {
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
    }
    #lobby h1 {
      font-size: 3rem; font-weight: 900; letter-spacing: -2px;
      color: #fff; text-shadow: 0 0 40px #e94560aa;
    }
    #lobby h1 span { color: #e94560; }
    #lobby p { color: #aaa; font-size: 1rem; }
    .lobby-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 32px; width: 340px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .lobby-card input {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px; padding: 12px 16px; color: #fff;
      font-size: 1rem; outline: none; width: 100%;
      transition: border-color 0.2s;
    }
    .lobby-card input:focus { border-color: #e94560; }
    .color-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .color-btn {
      width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent;
      cursor: pointer; transition: transform 0.15s, border-color 0.15s;
    }
    .color-btn:hover { transform: scale(1.15); }
    .color-btn.selected { border-color: #fff; }
    .join-btn {
      background: #e94560; color: #fff; border: none;
      border-radius: 8px; padding: 14px; font-size: 1rem;
      font-weight: 700; cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    .join-btn:hover { background: #c73652; transform: translateY(-1px); }
    .join-btn:active { transform: translateY(0); }

    /* ---- GAME UI ---- */
    #game { position: fixed; inset: 0; display: none; }
    #canvas { display: block; width: 100%; height: 100%; }

    /* Crosshair */
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none; display: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.9);
    }
    #crosshair::before { width: 20px; height: 2px; top: -1px; left: -10px; }
    #crosshair::after  { width: 2px; height: 20px; top: -10px; left: -1px; }

    /* HUD */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 12px 20px; display: none;
      justify-content: space-between; align-items: flex-start;
      pointer-events: none;
    }
    #health-bar {
      background: rgba(0,0,0,0.5); border-radius: 20px;
      padding: 6px 14px; color: #fff; font-size: 0.85rem;
      display: flex; align-items: center; gap: 8px;
    }
    #health-fill {
      height: 8px; width: 100px; background: #333;
      border-radius: 4px; overflow: hidden;
    }
    #health-fill-inner {
      height: 100%; background: #2ecc71;
      transition: width 0.3s, background 0.3s;
      border-radius: 4px;
    }
    #ammo-display {
      background: rgba(0,0,0,0.5); border-radius: 20px;
      padding: 6px 14px; color: #fff; font-size: 0.85rem;
    }
    #player-name-tag {
      background: rgba(0,0,0,0.5); border-radius: 20px;
      padding: 6px 14px; color: #fff; font-size: 0.85rem;
    }

    /* Chat */
    #chat-panel {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 280px; background: rgba(10,10,20,0.85);
      backdrop-filter: blur(12px);
      border-left: 1px solid rgba(255,255,255,0.08);
      display: none; flex-direction: column;
      pointer-events: all;
    }
    #chat-header {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      color: #e94560; font-weight: 700; font-size: 0.9rem;
      display: flex; align-items: center; gap: 8px;
    }
    #online-count {
      margin-left: auto; background: #e94560;
      color: #fff; border-radius: 999px;
      padding: 2px 8px; font-size: 0.75rem;
    }
    #messages {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 6px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .msg { font-size: 0.8rem; line-height: 1.4; }
    .msg .sender { font-weight: 700; }
    .msg .sender.system { color: #f39c12; }
    .msg .text { color: #ccc; }
    #chat-input-row {
      padding: 10px 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex; gap: 8px;
    }
    #chat-input {
      flex: 1; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 8px 10px;
      color: #fff; font-size: 0.8rem; outline: none;
    }
    #chat-input:focus { border-color: #e94560; }
    #chat-send {
      background: #e94560; color: #fff; border: none;
      border-radius: 8px; padding: 8px 12px;
      cursor: pointer; font-size: 0.8rem; font-weight: 700;
    }

    /* Notifications */
    #notifs {
      position: fixed; top: 60px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 6px;
      pointer-events: none; z-index: 50;
    }
    .notif {
      background: rgba(0,0,0,0.75); color: #fff;
      padding: 8px 20px; border-radius: 20px;
      font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.1);
      animation: notifIn 0.3s ease, notifOut 0.3s ease 2.7s forwards;
    }
    @keyframes notifIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes notifOut { to { opacity:0; transform:translateY(-10px); } }

    /* Cooking UI */
    #cook-ui {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%);
      background: rgba(10,10,20,0.9);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 16px 24px;
      color: #fff; display: none; flex-direction: column;
      align-items: center; gap: 10px; min-width: 220px;
    }
    #cook-ui h3 { font-size: 0.9rem; color: #f39c12; }
    #cook-progress { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
    #cook-progress-inner { height: 100%; background: #f39c12; width: 0%; transition: width 0.5s linear; border-radius: 4px; }
    #cook-status { font-size: 0.8rem; color: #aaa; }
    #cook-close {
      background: #e94560; border: none; color: #fff;
      border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 0.8rem;
    }

    /* Controls hint */
    #controls-hint {
      position: fixed; bottom: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5); color: #aaa;
      padding: 6px 16px; border-radius: 20px;
      font-size: 0.72rem; pointer-events: none; display: none;
    }

    /* Death screen */
    #death-screen {
      position: fixed; inset: 0; background: rgba(180,0,0,0.4);
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; z-index: 80;
    }
    #death-screen h2 { color: #fff; font-size: 2.5rem; font-weight: 900; }
    #death-screen p { color: rgba(255,255,255,0.7); }
    #respawn-btn {
      background: #e94560; color: #fff; border: none;
      border-radius: 10px; padding: 14px 32px;
      font-size: 1.1rem; font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <h1>Block<span>World</span></h1>
  <p>A blocky multiplayer shooter</p>
  <div class="lobby-card">
    <input id="name-input" type="text" placeholder="Your name..." maxlength="20" />
    <div>
      <p style="color:#aaa;font-size:0.8rem;margin-bottom:8px;">Pick a color:</p>
      <div class="color-row" id="color-row"></div>
    </div>
    <button class="join-btn" id="join-btn">JOIN GAME</button>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <canvas id="canvas"></canvas>
  <div id="crosshair"></div>

  <div id="hud">
    <div id="health-bar">
      ❤️ <div id="health-fill"><div id="health-fill-inner"></div></div>
      <span id="health-text">100</span>
    </div>
    <div id="player-name-tag">👤 <span id="hud-name"></span></div>
    <div id="ammo-display">🔫 <span id="ammo-text">∞</span></div>
  </div>

  <div id="chat-panel">
    <div id="chat-header">
      💬 CHAT
      <span id="online-count">0</span>
    </div>
    <div id="messages"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="Message..." maxlength="200" />
      <button id="chat-send">→</button>
    </div>
  </div>

  <div id="notifs"></div>

  <div id="cook-ui">
    <h3>🍳 Cooking: <span id="cook-item-name">Egg</span></h3>
    <div id="cook-progress"><div id="cook-progress-inner"></div></div>
    <div id="cook-status">Cooking...</div>
    <button id="cook-close">Close</button>
  </div>

  <div id="controls-hint">
    WASD Move · Mouse Look · Click Shoot · E Interact · T Chat · ESC Unlock
  </div>

  <div id="death-screen">
    <h2>💀 YOU DIED</h2>
    <p>Better luck next time!</p>
    <button id="respawn-btn">RESPAWN</button>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
